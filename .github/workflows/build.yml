name: Build s9pk

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build elektron-seeder.s9pk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Install start-cli
        run: |
          sudo curl -fsSL https://github.com/Start9Labs/start-os/releases/latest/download/start-cli_x86_64-linux \
            -o /usr/local/bin/start-cli
          sudo chmod +x /usr/local/bin/start-cli
          start-cli --version

      - name: Build s9pk
        run: make

      - name: Verify s9pk
        run: |
          ls -la elektron-seeder.s9pk
          start-cli package inspect elektron-seeder.s9pk || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elektron-seeder-s9pk
          path: elektron-seeder.s9pk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: elektron-seeder-s9pk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: elektron-seeder.s9pk
          generate_release_notes: true
          draft: false
          prerelease: false
